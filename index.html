function useToast(){
  const [msg,setMsg]=useState("");
  const t=useRef(null);
  const show=useCallback(m=>{setMsg(m);clearTimeout(t.current);t.current=setTimeout(()=>setMsg(""),2500);},[]);
  const Toast=()=>msg?(<div style={{position:"absolute",bottom:18,left:"50%",transform:"translateX(-50%)",background:"#1f2c34",color:"#fff",padding:"9px 18px",borderRadius:24,fontSize:13,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 2px 12px rgba(0,0,0,.3)",pointerEvents:"none"}}>{msg}</div>):null;
  return{show,Toast};
}

function OTP({onDone}){
  const [v,setV]=useState(["","","","","",""]);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  const set=(i,val)=>{
    if(!/^\d?$/.test(val))return;
    const nv=[...v];nv[i]=val;setV(nv);
    if(val&&i<5)refs[i+1].current.focus();
    if(nv.every(x=>x))onDone(nv.join(""));
  };
  const key=(i,e)=>{if(e.key==="Backspace"&&!v[i]&&i>0){const nv=[...v];nv[i-1]="";setV(nv);refs[i-1].current.focus();}};
  return(
    <div style={{display:"flex",gap:8,justifyContent:"center",margin:"16px 0"}}>
      {v.map((d,i)=>(
        <input key={i} ref={refs[i]} value={d} maxLength={1} inputMode="numeric"
          onChange={e=>set(i,e.target.value)} onKeyDown={e=>key(i,e)}
          style={{width:44,height:48,textAlign:"center",fontSize:20,fontWeight:700,border:"1.5px solid #e9edef",borderRadius:8,outline:"none",color:"#111b21"}}
          onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"}/>
      ))}
    </div>
  );
}

  const avFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setAvImg(ev.target.result);r.readAsDataURL(f);};

          <p style={{fontSize:12,color:G,textAlign:"center",fontWeight:600,marginBottom:2}}>Demo OTP: 1 2 3 4 5 6</p>

          {err&&<p style={{fontSize:12,color:"#dc3545",textAlign:"center"}}>{err}</p>}
          <button onClick={()=>{setStep(1);setErr("");}} style={{...pbtn,background:"transparent",color:T,border:`1.5px solid ${T}`,marginTop:8}}>← Change number</button>
        </>}
        {step===3&&<>
          <h2 style={{textAlign:"center",fontSize:18,fontWeight:600,marginBottom:6}}>Set up your profile</h2>
          <p style={{fontSize:13,color:MUT,textAlign:"center",marginBottom:16}}>Add your name and photo</p>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
            <div onClick={()=>fRef.current.click()} style={{position:"relative",cursor:"pointer"}}>
              <Av text={name?name[0].toUpperCase():"?"} bg={T} size={80} fs={30} img={avImg}/>
              <div style={{position:"absolute",bottom:0,right:0,width:24,height:24,background:G,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #fff"}}><Ic d={IC.plus} size={12} color="#fff" sw={2.5}/></div>
            </div>
            <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={avFile}/>
          </div>
          <label style={lbl}>YOUR NAME</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Rahul Sharma" autoFocus style={{...inp,marginBottom:12}} onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"} onKeyDown={e=>e.key==="Enter"&&finish()}/>
          <label style={lbl}>ABOUT</label>
          <input value={about} onChange={e=>setAbout(e.target.value)} style={inp} onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"}/>
          {err&&<p style={{fontSize:12,color:"#dc3545",textAlign:"center",marginTop:6}}>{err}</p>}
          <button style={pbtn} onClick={finish}>Continue ✓</button>
        </>}
      </div>
    </div>
  );
}

function CallModal({contact,type,onEnd}){
  const [muted,setMuted]=useState(false);
  const [spk,setSpk]=useState(false);
  const [hold,setHold]=useState(false);
  const [secs,setSecs]=useState(-1);
  useEffect(()=>{const t=setTimeout(()=>setSecs(0),1800);return()=>clearTimeout(t);},[]);
  useEffect(()=>{if(secs<0)return;const t=setTimeout(()=>setSecs(s=>s+1),1000);return()=>clearTimeout(t);},[secs]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return(
    <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,#0b1926,#1a3a2a)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <Av text={contact.av} bg={contact.color} size={96} fs={34} img={contact.avImg}/>
      <div style={{color:"#fff",fontSize:22,fontWeight:600}}>{contact.name}</div>
      <div style={{color:"rgba(255,255,255,.7)",fontSize:14}}>{secs<0?"Calling...":(type==="video"?"Video call • ":"")+fmt(secs)}</div>
      {type==="video"&&secs>=0&&(
        <div style={{width:120,height:90,background:"rgba(255,255,255,.1)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",position:"absolute",top:80,right:20}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>Your camera</span>
        </div>
      )}
      <div style={{display:"flex",gap:20,marginTop:10,flexWrap:"wrap",justifyContent:"center"}}>
        {[
          {icon:muted?IC.mutemic:IC.mic,label:muted?"Unmute":"Mute",bg:muted?"#c0392b":"#2c3e50",fn:()=>setMuted(m=>!m)},
          {icon:IC.speaker,label:spk?"Spk On":"Speaker",bg:spk?"#27ae60":"#2c3e50",fn:()=>setSpk(s=>!s)},
          {icon:IC.video,label:"Camera",bg:"#2c3e50",fn:()=>{}},
          {icon:IC.block,label:"End",bg:"#dc3545",fn:onEnd,sz:26},
          {icon:IC.plus,label:hold?"Resume":"Hold",bg:hold?"#e67e22":"#2c3e50",fn:()=>setHold(h=>!h)},
        ].map(({icon,label,bg,fn,sz=20})=>(
          <div key={label} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <button onClick={fn} style={{width:60,height:60,borderRadius:"50%",background:bg,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"}
              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              <Ic d={icon} color="#fff" size={sz}/>
            </button>
            <span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SidePanel({open,onClose,title,children,w=360}){
  return(
    <div style={{position:"absolute",top:0,left:0,width:w,height:700,background:"#fff",boxShadow:"4px 0 20px rgba(0,0,0,.15)",zIndex:200,display:open?"flex":"none",flexDirection:"column",overflow:"hidden"}}>
      <div style={{background:DK,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <HBtn onClick={onClose}><Ic d={IC.back} color="#aebac1"/></HBtn>
        <span style={{color:"#fff",fontSize:16,fontWeight:600}}>{title}</span>

      <div style={{flex:1,overflowY:"auto"}}>{children}</div>
    </div>

}

function PRow({icon,label,sub,onClick,danger=false}){
  return(
    <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 20px",cursor:"pointer",background:"#fff"}}
      onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"}
      onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
      <div style={{width:38,height:38,borderRadius:"50%",background:danger?"#fde8e8":"#f0f2f5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <Ic d={icon} color={danger?"#dc3545":T} size={18}/>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:15,color:danger?"#dc3545":"#111b21",fontWeight:500}}>{label}</div>
        {sub&&<div style={{fontSize:12,color:MUT,marginTop:2}}>{sub}</div>}
      </div>
    </div>

}

function App(){
  const [user,setUser]=useState(null);
  const [contacts,setContacts]=useState([]);
  const [aid,setAid]=useState(null);
  const [search,setSearch]=useState("");
  const [tab,setTab]=useState("chats");
  const [sMenu,setSMenu]=useState(false);
  const [cMenu,setCMenu]=useState(false);
  const [showE,setShowE]=useState(false);
  const [showA,setShowA]=useState(false);
  const [txt,setTxt]=useState("");
  const [call,setCall]=useState(null);
  const [rec,setRec]=useState(false);
  const [recS,setRecS]=useState(0);
  const [panel,setPanel]=useState(null);
  const [ctx,setCtx]=useState(null);
  const [selMsgs,setSelMsgs]=useState(null);
  const [disMode,setDisMode]=useState("off");
  const [eName,setEName]=useState("");
  const [eAbout,setEAbout]=useState("");
  const [grpSel,setGrpSel]=useState(new Set());
  const [grpName,setGrpName]=useState("");
  const [grpStep,setGrpStep]=useState(1);
  const endRef=useRef();
  const inpRef=useRef();
  const recRef=useRef();
  const {show:toast,Toast}=useToast();

  const active=contacts.find(c=>c.id===aid)||null;
  const upd=fn=>setContacts(cs=>cs.map(c=>c.id===aid?fn(c):c));
  const updC=(id,fn)=>setContacts(cs=>cs.map(c=>c.id===id?fn(c):c));

  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[active?.msgs?.length,rec]);

  const startApp=u=>{setUser(u);setContacts(clone(CONTACTS));};

  const sendMsg=(t)=>{
    const text=(t||txt).trim();if(!text||!aid)return;
    const m={id:Date.now(),text,time:nowTime(),from:"me",starred:false};
    upd(c=>({...c,msgs:[...c.msgs,m],unread:0}));
    setTxt("");if(inpRef.current)inpRef.current.style.height="auto";
    setShowE(false);setShowA(false);
    if(Math.random()>.2)setTimeout(autoReply,900+Math.random()*700);
  };

  const autoReply=()=>{
    setContacts(cs=>cs.map(c=>{
      if(c.id!==aid)return c;
      return{...c,msgs:[...c.msgs,{id:Date.now()+1,text:REPLIES[Math.floor(Math.random()*REPLIES.length)],time:nowTime(),from:"them",starred:false}]};
    }));
  };

  const sendAttach=type=>{
    const map={image:"📷 Photo sent",camera:"📸 Camera photo",doc:"📄 Document.pdf",loc:"📍 Location shared",contact:"👤 Contact card",sticker:"😄 Sticker",audio:"🎵 Audio file"};
    sendMsg(map[type]);setShowA(false);
  };

  const startRec=()=>{setRec(true);setRecS(0);recRef.current=setInterval(()=>setRecS(s=>s+1),1000);};
  const cancelRec=()=>{clearInterval(recRef.current);setRec(false);setRecS(0);toast("Voice message cancelled");};
  const sendRec=()=>{
    clearInterval(recRef.current);
    sendMsg(`🎙️ Voice message (${Math.floor(recS/60)}:${String(recS%60).padStart(2,"0")})`);
    setRec(false);setRecS(0);
  };

  const startCall=type=>{if(!active)return;setCall({type,cid:aid});setPanel(null);};
  const endCall=()=>{setCall(null);toast("Call ended");};

  const clearChat=()=>{if(window.confirm("Clear all messages?"))upd(c=>({...c,msgs:[]}));toast("Chat cleared");};
  const exportChat=()=>{
    if(!active)return;
    const tx=active.msgs.map(m=>`[${m.time}] ${m.from==="me"?user.name:active.name}: ${m.text}`).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([tx],{type:"text/plain"}));
    a.download=`${active.name}_chat.txt`;a.click();toast("Chat exported!");
  };
  const toggleMute=(id)=>{const cid=id||aid;updC(cid,c=>({...c,muted:!c.muted}));toast(contacts.find(c=>c.id===cid)?.muted?"Unmuted 🔔":"Muted 🔕");};
  const togglePin=id=>{updC(id,c=>({...c,pinned:!c.pinned}));};
  const toggleBlock=()=>{upd(c=>({...c,blocked:!c.blocked}));toast(active?.blocked?"Unblocked ✓":"Blocked 🚫");};
  const toggleStar=mid=>{upd(c=>({...c,msgs:c.msgs.map(m=>m.id===mid?{...m,starred:!m.starred}:m)}));};
  const delMsg=mid=>{upd(c=>({...c,msgs:c.msgs.filter(m=>m.id!==mid)}));setCtx(null);};
  const copyMsg=text=>{if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>toast("Copied!"));else toast("Copied!");setCtx(null);};
  const replyMsg=text=>{setTxt(`> ${text}\n`);inpRef.current?.focus();setCtx(null);};
  const fwdMsg=text=>{toast(`Forwarded ✓`);setCtx(null);};

  const newContact=()=>{
    const n=window.prompt("Contact name:");if(!n)return;
    const ex=contacts.find(c=>c.name.toLowerCase()===n.toLowerCase());
    if(ex){setAid(ex.id);return;}
    const cols=["#e91e63","#2196f3","#ff9800","#9c27b0","#00bcd4","#795548","#f44336","#607d8b"];
    const nc={id:Date.now(),name:n,phone:`+91 ${Math.floor(Math.random()*9e9+1e9)}`,about:"Hey there! I am using WhatsApp",color:cols[Math.floor(Math.random()*cols.length)],av:n.slice(0,2).toUpperCase(),unread:0,online:false,muted:false,blocked:false,pinned:false,msgs:[]};
    setContacts(cs=>[nc,...cs]);setAid(nc.id);toast(`New chat with ${n} started`);
  };

  const createGroup=()=>{
    if(!grpName.trim()){toast("Enter a group name");return;}
    const sel=contacts.filter(c=>grpSel.has(c.id));
    const ng={id:Date.now(),name:grpName.trim(),phone:"",about:`${sel.length+1} members`,color:"#"+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,"0"),av:grpName.slice(0,2).toUpperCase(),unread:0,online:false,muted:false,blocked:false,pinned:false,msgs:[{id:1,text:`Group created by ${user.name}`,time:nowTime(),from:"them",starred:false}]};
    setContacts(cs=>[ng,...cs]);setAid(ng.id);setPanel(null);setGrpSel(new Set());setGrpName("");setGrpStep(1);toast(`"${ng.name}" created! 🎉`);
  };

  const allStarred=contacts.flatMap(c=>c.msgs.filter(m=>m.starred).map(m=>({...m,cName:c.name,cColor:c.color,cAv:c.av})));
  const disModes=["off","24 hours","7 days","90 days"];
  const nextDis=()=>{const i=disModes.indexOf(disMode);const n=disModes[(i+1)%disModes.length];setDisMode(n);toast(`Disappearing: ${n}`);};
  const sorted=[...contacts.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()))].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const fmtR=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const callC=call?contacts.find(c=>c.id===call.cid):null;

  if(!user)return <Login onDone={startApp}/>;

  return(
    <div style={{width:"100%",height:700,display:"flex",borderRadius:12,overflow:"hidden",fontFamily:"'Segoe UI',system-ui,sans-serif",position:"relative"}}
      onClick={e=>{
        if(!e.target.closest("[data-sd]"))setSMenu(false);
        if(!e.target.closest("[data-cd]"))setCMenu(false);
        if(!e.target.closest("[data-em]"))setShowE(false);
        if(!e.target.closest("[data-at]"))setShowA(false);
        setCtx(null);
      }}>

      {/* ── SIDEBAR ── */}
      <div style={{width:380,minWidth:320,background:"#fff",borderRight:"1px solid #e9edef",display:"flex",flexDirection:"column",height:700,flexShrink:0}}>

        {/* Header */}
        <div style={{background:DK,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <Av text={user.name[0].toUpperCase()} bg={G} size={40} fs={15} img={user.avImg} style={{cursor:"pointer"}} onClick={()=>{setEName(user.name);setEAbout(user.about);setPanel("myprofile");}}/>
          <div style={{display:"flex",gap:2}}>
            <HBtn title="Status" onClick={()=>setPanel("status")}><Ic d={IC.clock} color="#aebac1"/></HBtn>
            <HBtn title="New chat" onClick={newContact}><Ic d={IC.chat} color="#aebac1"/></HBtn>
            <div style={{position:"relative"}} data-sd>
              <HBtn onClick={()=>setSMenu(v=>!v)}><Dots/></HBtn>
              <DropMenu open={sMenu} style={{right:0,top:44}}>
                <DItem onClick={()=>{setSMenu(false);setGrpSel(new Set());setGrpStep(1);setGrpName("");setPanel("newgroup");}}>New group</DItem>
                <DItem onClick={()=>{setSMenu(false);setEName(user.name);setEAbout(user.about);setPanel("myprofile");}}>Profile</DItem>
                <DItem onClick={()=>{setSMenu(false);setPanel("starred");}}>Starred messages</DItem>
                <DItem onClick={()=>{setSMenu(false);setPanel("settings");}}>Settings</DItem>
                <DItem onClick={()=>{setSMenu(false);setPanel("devices");}}>Linked devices</DItem>
                <DItem onClick={()=>setUser(null)} danger>Log out</DItem>
              </DropMenu>
            </div>
          </div>
        </div>

        {/* Search */}
        <div style={{padding:"8px 12px",background:"#fff",flexShrink:0}}>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic d={IC.search} size={16} color={MUT}/></div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search or start new chat"
              style={{width:"100%",padding:"8px 8px 8px 34px",background:"#f0f2f5",border:"none",borderRadius:8,fontSize:14,color:"#111b21",outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #e9edef",flexShrink:0}}>
          {["Chats","Status","Calls"].map(t=>(
            <div key={t} onClick={()=>{setTab(t.toLowerCase());if(t!=="Chats")setPanel(t.toLowerCase());}} style={{flex:1,padding:"10px 0",textAlign:"center",fontSize:13,fontWeight:500,cursor:"pointer",color:tab===t.toLowerCase()?T:MUT,borderBottom:tab===t.toLowerCase()?`2px solid ${T}`:"2px solid transparent"}}>{t}</div>
          ))}
        </div>

        {/* Chat list */}
        <div style={{flex:1,overflowY:"auto"}}>
          {sorted.length===0&&<p style={{padding:24,textAlign:"center",color:MUT,fontSize:14}}>No chats found</p>}
          {sorted.map(c=>{
            const last=c.msgs[c.msgs.length-1];
            return(
              <div key={c.id} onClick={()=>{setAid(c.id);updC(c.id,x=>({...x,unread:0}));}}
                style={{display:"flex",alignItems:"center",padding:"10px 16px",cursor:"pointer",background:aid===c.id?"#f0f2f5":"#fff",borderBottom:"1px solid #e9edef",gap:12}}
                onMouseEnter={e=>{if(aid!==c.id)e.currentTarget.style.background="#f5f6f6";}}
                onMouseLeave={e=>{if(aid!==c.id)e.currentTarget.style.background="#fff";}}>
                <div style={{position:"relative"}}>
                  <Av text={c.av} bg={c.color} size={49} fs={16} img={c.avImg}/>
                  {c.online&&<div style={{position:"absolute",bottom:2,right:2,width:11,height:11,borderRadius:"50%",background:G,border:"2px solid #fff"}}/>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:15,fontWeight:500,color:"#111b21",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>
                      {c.pinned&&<span style={{fontSize:10,color:MUT,marginRight:4}}>📌</span>}{c.name}{c.muted&&<span style={{fontSize:11,color:MUT,marginLeft:3}}>🔕</span>}
                    </span>
                    <span style={{fontSize:12,color:c.unread>0?T:MUT,flexShrink:0,marginLeft:4}}>{last?.time||""}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
                    <span style={{fontSize:13,color:MUT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{last?(last.from==="me"?"You: ":"")+last.text:"No messages yet"}</span>
                    {c.unread>0&&<div style={{background:c.muted?"#8696a0":G,color:"#fff",borderRadius:"50%",minWidth:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px",fontWeight:700,flexShrink:0,marginLeft:4}}>{c.unread>99?"99+":c.unread}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── CHAT AREA ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",height:700,position:"relative"}}>
        {!active?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#efeae2",gap:16}}>
            <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,rgba(0,0,0,.04)1px,transparent 1px)",backgroundSize:"24px 24px"}}/>
            <Ic d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" color={G} size={80} sw={1.2}/>
            <h3 style={{fontSize:22,fontWeight:300,color:"#111b21",zIndex:1}}>WhatsApp Web</h3>
            <p style={{fontSize:13,color:MUT,textAlign:"center",maxWidth:280,lineHeight:1.7,zIndex:1}}>Send and receive messages without keeping your phone online.</p>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:MUT,border:"1px solid #e9edef",borderRadius:20,padding:"5px 12px",zIndex:1,background:"rgba(255,255,255,.6)"}}>
              <Ic d={IC.lock} size={12} color={MUT} sw={2}/> Your messages are end-to-end encrypted
            </div>
          </div>
        ):(
          <>
            <div style={{position:"absolute",inset:0,background:"#efeae2",backgroundImage:"radial-gradient(circle,rgba(0,0,0,.04)1px,transparent 1px)",backgroundSize:"24px 24px"}}/>

            {/* Chat header */}
            <div style={{background:DK,padding:"10px 16px",display:"flex",alignItems:"center",gap:10,zIndex:10,flexShrink:0,position:"relative"}}>
              <HBtn onClick={()=>setAid(null)}><Ic d={IC.back} color="#aebac1"/></HBtn>
              <div style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,flex:1}} onClick={()=>setPanel("profile")}>
                <Av text={active.av} bg={active.color} size={38} fs={14} img={active.avImg}/>
                <div>
                  <div style={{fontSize:15,fontWeight:600,color:"#fff"}}>{active.name}</div>
                  <div style={{fontSize:12,color:"#aebac1",display:"flex",alignItems:"center",gap:4}}>
                    {active.online&&<span style={{width:7,height:7,borderRadius:"50%",background:G,display:"inline-block"}}/>}
                    {active.online?"online":"last seen recently"}
                  </div>
                </div>
              </div>
              {selMsgs&&<span style={{color:"#fff",fontSize:14}}>{selMsgs.size} selected</span>}
              <div style={{display:"flex",gap:2}}>
                {selMsgs?(
                  <>
                    <HBtn onClick={()=>{selMsgs.forEach(id=>toggleStar(id));setSelMsgs(null);toast("Starred ⭐");}}><Ic d={IC.star} color="#aebac1"/></HBtn>
                    <HBtn onClick={()=>{upd(c=>({...c,msgs:c.msgs.filter(m=>!selMsgs.has(m.id))}));setSelMsgs(null);toast("Deleted");}}><Ic d={IC.trash} color="#aebac1"/></HBtn>
                    <HBtn onClick={()=>setSelMsgs(null)}><Ic d={IC.close} color="#aebac1"/></HBtn>
                  </>
                ):(
                  <>
                    <HBtn title="Video call" onClick={()=>startCall("video")}><Ic d={IC.video} color="#aebac1"/></HBtn>
                    <HBtn title="Voice call" onClick={()=>startCall("voice")}><Ic d={IC.phone} color="#aebac1"/></HBtn>
                    <div style={{position:"relative"}} data-cd>
                      <HBtn onClick={()=>setCMenu(v=>!v)}><Dots/></HBtn>
                      <DropMenu open={cMenu} style={{right:0,top:44,zIndex:300}}>
                        <DItem onClick={()=>{setCMenu(false);setPanel("profile");}}>Contact info</DItem>
                        <DItem onClick={()=>{setCMenu(false);setSelMsgs(new Set());}}>Select messages</DItem>
                        <DItem onClick={()=>{setCMenu(false);toggleMute();}}>{active.muted?"Unmute notifications":"Mute notifications"}</DItem>
                        <DItem onClick={()=>{setCMenu(false);nextDis();}}>Disappearing messages <span style={{fontSize:11,color:MUT}}>({disMode})</span></DItem>
                        <DItem onClick={()=>{setCMenu(false);clearChat();}}>Clear chat</DItem>
                        <DItem onClick={()=>{setCMenu(false);exportChat();}}>Export chat</DItem>
                        <DItem onClick={()=>{setCMenu(false);toggleBlock();}} danger>{active.blocked?"Unblock":"Block"}</DItem>
                        <DItem onClick={()=>{setCMenu(false);toast("Report submitted. Thank you.");}} danger>Report</DItem>
                      </DropMenu>
                    </div>
                  </>
                )}
              </div>
            </div>

            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:3,position:"relative",zIndex:1}}>
              <div style={{textAlign:"center",marginBottom:8}}>
                <span style={{background:"rgba(11,20,26,.15)",color:"#54656f",fontSize:12,padding:"4px 12px",borderRadius:8}}>Today</span>
              </div>
              {disMode!=="off"&&<div style={{textAlign:"center",margin:"4px 0"}}><span style={{background:"rgba(11,20,26,.1)",color:"#54656f",fontSize:11,padding:"3px 10px",borderRadius:8}}>⏱️ Disappearing: {disMode}</span></div>}
              {active.msgs.map(msg=>{
                const sel=selMsgs?.has(msg.id);
                return(
                  <div key={msg.id} style={{display:"flex",flexDirection:"column",alignItems:msg.from==="me"?"flex-end":"flex-start",marginBottom:2}}
                    onClick={()=>{if(selMsgs){setSelMsgs(prev=>{const s=new Set(prev);s.has(msg.id)?s.delete(msg.id):s.add(msg.id);return s;});}}}
                    onContextMenu={e=>{e.preventDefault();setCtx({x:Math.min(e.clientX-100,window.innerWidth-210),y:Math.min(e.clientY,window.innerHeight-260),msg});}}>
                    <div style={{maxWidth:"65%",padding:"7px 12px 5px",borderRadius:msg.from==="me"?"8px 0 8px 8px":"0 8px 8px 8px",background:sel?"#d0f0c0":msg.from==="me"?"#d9fdd3":"#fff",wordBreak:"break-word",outline:sel?`2px solid ${G}`:"none",position:"relative",cursor:selMsgs?"pointer":"default"}}>
                      {msg.starred&&<span style={{position:"absolute",top:-4,right:-4,fontSize:10}}>⭐</span>}
                      <div style={{fontSize:14.5,color:"#111b21",lineHeight:1.45}}>{msg.text}</div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:3,marginTop:1}}>
                        <span style={{fontSize:11,color:MUT}}>{msg.time}</span>
                        {msg.from==="me"&&<Tick/>}
                      </div>
                    </div>
                  </div>
                );
              })}
              {rec&&<div style={{display:"flex",alignItems:"flex-end"}}><div style={{background:"#d9fdd3",borderRadius:"8px 0 8px 8px",padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{color:"#dc3545"}}>●</span><span style={{fontSize:14,color:"#111b21"}}>Recording... {fmtR(recS)}</span></div></div>}
              <div ref={endRef}/>
            </div>

            {/* Context menu */}
            {ctx&&(
              <div style={{position:"fixed",left:ctx.x,top:ctx.y,background:"#fff",borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:500,minWidth:170,overflow:"hidden"}}
                onClick={e=>e.stopPropagation()}>
                {[["↩️ Reply",()=>replyMsg(ctx.msg.text)],["⭐ "+(ctx.msg.starred?"Unstar":"Star"),()=>{toggleStar(ctx.msg.id);setCtx(null);}],["📋 Copy",()=>copyMsg(ctx.msg.text)],["↗️ Forward",()=>fwdMsg(ctx.msg.text)],["📌 Pin",()=>{toast("Pinned 📌");setCtx(null);}],["🗑️ Delete",()=>delMsg(ctx.msg.id),true]].map(([lbl,fn,danger])=>(
                  <div key={lbl} onClick={fn} style={{padding:"11px 16px",fontSize:13,cursor:"pointer",color:danger?"#dc3545":"#111b21"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}>{lbl}</div>
                ))}
              </div>
            )}

            {/* Emoji picker */}
            {showE&&(
              <div data-em style={{position:"absolute",bottom:68,left:8,background:"#fff",border:"1px solid #e9edef",borderRadius:12,padding:10,width:300,boxShadow:"0 4px 20px rgba(0,0,0,.14)",zIndex:50}}>
                <div style={{fontSize:11,color:MUT,marginBottom:6,fontWeight:600}}>Click to insert emoji</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:2}}>
                  {EMOJIS.map(e=>(
                    <div key={e} style={{fontSize:22,cursor:"pointer",textAlign:"center",padding:4,borderRadius:6,lineHeight:1.3}}
                      onClick={()=>{setTxt(t=>t+e);inpRef.current?.focus();}}
                      onMouseEnter={ev=>ev.currentTarget.style.background="#f0f2f5"}
                      onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>{e}</div>
                  ))}
                </div>
              </div>
            )}

            {/* Attach menu */}
            {showA&&(
              <div data-at style={{position:"absolute",bottom:68,left:52,display:"flex",flexDirection:"column",gap:8,zIndex:50}}>
                {[["image","#a849f5","Photos & Videos",IC.image],["camera","#e84393","Camera",IC.camera],["doc","#5157ae","Document",IC.doc],["loc","#16a085","Location",IC.loc],["contact","#009de2","Contact",IC.contact],["audio","#f39c12","Audio",IC.mic],["sticker","#e67e22","Sticker",IC.emoji]].map(([type,bg,label,icon])=>(
                  <div key={type} onClick={()=>sendAttach(type)} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1px solid #e9edef",borderRadius:24,padding:"8px 16px",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)",fontSize:13,color:"#111b21",whiteSpace:"nowrap"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={icon} color="#fff" size={14}/></div>
                    {label}
                  </div>
                ))}
              </div>
            )}

            {/* Voice recording bar */}
            {rec&&(
              <div style={{background:DK,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,zIndex:10,flexShrink:0}}>
                <span style={{color:"#dc3545",fontSize:18}}>●</span>
                <span style={{color:"#fff",fontSize:15,fontWeight:600,minWidth:50}}>{fmtR(recS)}</span>
                <span style={{color:"#aebac1",fontSize:13,flex:1}}>Recording... slide to cancel</span>
                <button onClick={cancelRec} style={{background:"none",border:"none",color:"#aebac1",cursor:"pointer",padding:6,borderRadius:"50%"}}><Ic d={IC.close} color="#aebac1" size={18}/></button>
                <button onClick={sendRec} style={{background:G,border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={IC.send} color="#fff" size={17}/></button>
              </div>
            )}

            {/* Input area */}
            {!rec&&(
              <div style={{background:"#f0f2f5",padding:"8px 12px",display:"flex",alignItems:"flex-end",gap:8,zIndex:10,flexShrink:0}}>
                <button data-em onClick={()=>{setShowE(v=>!v);setShowA(false);}} style={{background:"none",border:"none",cursor:"pointer",padding:8,borderRadius:"50%",display:"flex"}}>
                  <Ic d={IC.emoji} color={showE?T:"#8696a0"}/>
                </button>
                <button data-at onClick={()=>{setShowA(v=>!v);setShowE(false);}} style={{background:"none",border:"none",cursor:"pointer",padding:8,borderRadius:"50%",display:"flex"}}>
                  <Ic d={IC.attach} color={showA?T:"#8696a0"}/>
                </button>
                <textarea ref={inpRef} value={txt} onChange={e=>setTxt(e.target.value)}
                  placeholder={active.blocked?"You blocked this contact":"Type a message"}
                  disabled={active.blocked} rows={1}
                  style={{flex:1,background:"#fff",border:"none",borderRadius:12,padding:"10px 14px",fontSize:14.5,color:"#111b21",outline:"none",resize:"none",minHeight:42,maxHeight:120,lineHeight:1.4,fontFamily:"inherit"}}
                  onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
                {txt.trim()?(
                  <button onClick={()=>sendMsg()} style={{width:44,height:44,borderRadius:"50%",background:T,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Ic d={IC.send} color="#fff" size={18}/>
                  </button>
                ):(
                  <button onClick={startRec} disabled={active.blocked} style={{width:44,height:44,borderRadius:"50%",background:T,border:"none",cursor:active.blocked?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:active.blocked?.5:1}}>
                    <Ic d={IC.mic} color="#fff" size={18}/>
                  </button>
                )}
              </div>
            )}

            {call&&callC&&<CallModal contact={callC} type={call.type} onEnd={endCall}/>}

            {/* Contact profile panel */}
            <SidePanel open={panel==="profile"} onClose={()=>setPanel(null)} title="Contact info">
              {active&&<>
                <div style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",background:"#f0f2f5",borderBottom:"6px solid #e9edef"}}>
                  <Av text={active.av} bg={active.color} size={100} fs={34} img={active.avImg}/>
                  <div style={{fontSize:20,fontWeight:600,marginTop:10,color:"#111b21"}}>{active.name}</div>
                  <div style={{fontSize:13,color:MUT,marginTop:3}}>{active.phone||"Group"}</div>
                  <div style={{display:"flex",gap:16,marginTop:14}}>
                    {[["voice","Voice",IC.phone],["video","Video",IC.video],["msg","Message",IC.chat]].map(([k,l,ic])=>(
                      <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                        <button onClick={()=>k==="msg"?setPanel(null):startCall(k)} style={{width:42,height:42,borderRadius:"50%",background:"#f0f2f5",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                          onMouseEnter={e=>e.currentTarget.style.background="#e0e0e0"} onMouseLeave={e=>e.currentTarget.style.background="#f0f2f5"}>
                          <Ic d={ic} color={T} size={18}/>
                        </button>
                        <span style={{fontSize:11,color:T}}>{l}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{padding:16,borderBottom:"6px solid #f0f2f5"}}>
                  <div style={{fontSize:12,color:T,fontWeight:600,marginBottom:6}}>About</div>
                  <div style={{fontSize:14,color:"#111b21"}}>{active.about}</div>
                  <div style={{fontSize:12,color:T,fontWeight:600,margin:"14px 0 6px"}}>Media</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3}}>
                    {["🖼️","📄","🎵","📹","🔗","📷"].map((e,i)=>(
                      <div key={i} onClick={()=>toast("Opening media...")} style={{aspectRatio:"1",background:"#f0f2f5",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,cursor:"pointer"}}
                        onMouseEnter={ev=>ev.currentTarget.style.background="#e0e0e0"} onMouseLeave={ev=>ev.currentTarget.style.background="#f0f2f5"}>{e}</div>
                    ))}
                  </div>
                </div>
                <PRow icon={IC.bell} label={active.muted?"Unmute notifications":"Mute notifications"} onClick={()=>{toggleMute();setPanel(null);}}/>
                <PRow icon={IC.pin} label={active.pinned?"Unpin chat":"Pin chat"} onClick={()=>{togglePin(aid);toast(active.pinned?"Unpinned":"Pinned 📌");setPanel(null);}}/>
                <PRow icon={IC.star} label="Starred messages" onClick={()=>setPanel("starred")}/>
                <PRow icon={IC.block} label={active.blocked?"Unblock":("Block "+active.name)} onClick={()=>{toggleBlock();setPanel(null);}} danger/>
                <PRow icon={IC.trash} label="Delete chat" onClick={()=>{clearChat();setPanel(null);}} danger/>
              </>}
            </SidePanel>
          </>
        )}

        {/* Settings */}
        <SidePanel open={panel==="settings"} onClose={()=>setPanel(null)} title="Settings" w={380}>
          <div onClick={()=>{setEName(user.name);setEAbout(user.about);setPanel("myprofile");}} style={{padding:"16px 20px",display:"flex",alignItems:"center",gap:14,borderBottom:"6px solid #f0f2f5",cursor:"pointer",background:"#fff"}}
            onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <Av text={user.name[0].toUpperCase()} bg={G} size={56} fs={22} img={user.avImg}/>
            <div><div style={{fontSize:17,fontWeight:600,color:"#111b21"}}>{user.name}</div><div style={{fontSize:13,color:MUT}}>{user.about}</div></div>
          </div>
          {[[IC.contact,"Account","Privacy, security, change number"],[IC.lock,"Privacy","Last seen, profile photo, status"],[IC.chat,"Chats","Theme, wallpaper, chat history"],[IC.bell,"Notifications","Message, group & call tones"],[IC.settings,"Storage and data","Network usage, auto-download"],[IC.help,"Help","FAQ, contact us, privacy policy"]].map(([ic,l,sub])=>(
            <PRow key={l} icon={ic} label={l} sub={sub} onClick={()=>toast(`${l} settings opened`)}/>
          ))}
          <div style={{padding:"16px 20px"}}><button onClick={()=>setUser(null)} style={{color:"#dc3545",background:"none",border:"none",fontSize:15,cursor:"pointer",padding:0}}>Log out</button></div>
        </SidePanel>

        {/* My Profile */}
        <SidePanel open={panel==="myprofile"} onClose={()=>setPanel(null)} title="Profile" w={380}>
          <div style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",background:"#f0f2f5",borderBottom:"6px solid #e9edef"}}>
            <div style={{position:"relative",cursor:"pointer"}} onClick={()=>document.getElementById("avFileMain").click()}>
              <Av text={user.name[0].toUpperCase()} bg={G} size={100} fs={34} img={user.avImg}/>
              <div style={{position:"absolute",bottom:0,right:0,width:28,height:28,background:G,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #fff"}}><Ic d={IC.plus} size={12} color="#fff" sw={2.5}/></div>
            </div>
            <input type="file" id="avFileMain" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setUser(u=>({...u,avImg:ev.target.result}));r.readAsDataURL(f);}}/>
          </div>
          <div style={{padding:16}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:T,marginBottom:5}}>YOUR NAME</label>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <input value={eName} onChange={e=>setEName(e.target.value)} style={{flex:1,padding:"10px 13px",border:"1.5px solid #e9edef",borderRadius:8,fontSize:14,outline:"none"}} onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"}/>
              <button onClick={()=>{if(!eName.trim())return;setUser(u=>({...u,name:eName.trim()}));toast("Name updated ✓");}} style={{background:T,color:"#fff",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:T,marginBottom:5}}>ABOUT</label>
            <div style={{display:"flex",gap:8}}>
              <input value={eAbout} onChange={e=>setEAbout(e.target.value)} style={{flex:1,padding:"10px 13px",border:"1.5px solid #e9edef",borderRadius:8,fontSize:14,outline:"none"}} onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"}/>
              <button onClick={()=>{setUser(u=>({...u,about:eAbout}));toast("About updated ✓");}} style={{background:T,color:"#fff",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,cursor:"pointer"}}>Save</button>
            </div>
          </div>
        </SidePanel>

        {/* Starred */}
        <SidePanel open={panel==="starred"} onClose={()=>setPanel(null)} title="Starred messages">
          {allStarred.length===0?(
            <div style={{padding:40,textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>⭐</div>
              <p style={{fontSize:15,color:"#111b21",fontWeight:500,marginBottom:6}}>No starred messages</p>
              <p style={{fontSize:13,color:MUT}}>Right-click any message → Star</p>
            </div>
          ):allStarred.map((m,i)=>(
            <div key={i} style={{padding:"12px 20px",borderBottom:"1px solid #f0f2f5",cursor:"pointer"}}
              onClick={()=>{const c=contacts.find(x=>x.name===m.cName);if(c){setAid(c.id);setPanel(null);}}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <Av text={m.cAv} bg={m.cColor} size={24} fs={10}/>
                <span style={{fontSize:12,color:T,fontWeight:600}}>⭐ {m.cName}</span>
                <span style={{fontSize:11,color:MUT,marginLeft:"auto"}}>{m.time}</span>
              </div>
              <div style={{fontSize:14,color:"#111b21"}}>{m.text}</div>
            </div>
          ))}
        </SidePanel>

        {/* Linked devices */}
        <SidePanel open={panel==="devices"} onClose={()=>setPanel(null)} title="Linked devices" w={380}>
          <div style={{padding:"24px 20px",textAlign:"center"}}>
            <Ic d={IC.device} color={T} size={56} sw={1.2}/>
            <p style={{fontSize:15,color:"#111b21",fontWeight:500,marginTop:12,marginBottom:6}}>Link up to 4 devices</p>
            <p style={{fontSize:13,color:MUT,marginBottom:20,lineHeight:1.6}}>Use WhatsApp on up to 4 linked devices and 1 phone at the same time</p>
            <button onClick={()=>toast("QR scanner opened — point your phone at the screen")} style={{background:T,color:"#fff",border:"none",borderRadius:8,padding:"12px 24px",fontSize:14,cursor:"pointer",fontWeight:600}}>Link a device</button>
          </div>
        </SidePanel>

        {/* Status */}
        <SidePanel open={panel==="status"} onClose={()=>{setPanel(null);setTab("chats");}} title="Status" w={380}>
          <div style={{padding:"16px 20px"}}>
            <div style={{fontSize:12,color:MUT,fontWeight:600,marginBottom:10}}>MY STATUS</div>
            <div onClick={()=>toast("Add status: Text, photo, or video")} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",cursor:"pointer",borderBottom:"1px solid #f0f2f5"}}>
              <div style={{position:"relative"}}>
                <Av text={user.name[0].toUpperCase()} bg={G} size={48} fs={18} img={user.avImg}/>
                <div style={{position:"absolute",bottom:0,right:0,width:18,height:18,background:T,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",border:"1.5px solid #fff"}}><Ic d={IC.plus} size={10} color="#fff" sw={3}/></div>
              </div>
              <div><div style={{fontSize:15,fontWeight:500,color:"#111b21"}}>Add status update</div><div style={{fontSize:13,color:MUT}}>Tap to add</div></div>
            </div>
            <div style={{fontSize:12,color:MUT,fontWeight:600,margin:"14px 0 8px"}}>RECENT UPDATES</div>
            {contacts.filter(c=>c.online).map(c=>(
              <div key={c.id} onClick={()=>toast(`Viewing ${c.name}'s status ✓`)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",cursor:"pointer",borderBottom:"1px solid #f0f2f5"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <Av text={c.av} bg={c.color} size={48} fs={16} img={c.avImg} style={{border:`2px solid ${T}`}}/>
                <div><div style={{fontSize:15,fontWeight:500,color:"#111b21"}}>{c.name}</div><div style={{fontSize:13,color:MUT}}>{nowTime()}</div></div>
              </div>
            ))}
          </div>
        </SidePanel>

        {/* Calls */}
        <SidePanel open={panel==="calls"} onClose={()=>{setPanel(null);setTab("chats");}} title="Calls" w={380}>
          <div>
            <div style={{padding:"12px 20px",fontSize:12,color:MUT,fontWeight:600}}>RECENT CALLS</div>
            {contacts.slice(0,5).map((c,i)=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:"1px solid #f0f2f5",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <Av text={c.av} bg={c.color} size={46} fs={16} img={c.avImg}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:500,color:"#111b21"}}>{c.name}</div>
                  <div style={{fontSize:12,color:i%3===0?"#dc3545":MUT}}>{i%3===0?"📵 Missed":i%2===0?"📞 Outgoing":"📲 Incoming"} • {nowTime()}</div>
                </div>
                <button onClick={()=>{setAid(c.id);setPanel(null);startCall(i%2===0?"voice":"video");}} style={{background:"none",border:"none",cursor:"pointer",padding:8,borderRadius:"50%",color:T}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f0f2f5"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <Ic d={IC.phone} color={T} size={18}/>
                </button>
              </div>
            ))}
          </div>
        </SidePanel>

        {/* New Group */}
        <SidePanel open={panel==="newgroup"} onClose={()=>setPanel(null)} title={grpStep===1?"Add participants":"New group"} w={380}>
          {grpStep===1?(
            <div style={{padding:12}}>
              <div style={{padding:"8px 12px",background:"#f0f2f5",borderRadius:8,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                <Ic d={IC.search} size={16} color={MUT}/>
                <input placeholder="Search contacts" style={{background:"none",border:"none",outline:"none",fontSize:14,color:"#111b21",flex:1}}/>
              </div>
              {contacts.map(c=>(
                <div key={c.id} onClick={()=>setGrpSel(prev=>{const s=new Set(prev);s.has(c.id)?s.delete(c.id):s.add(c.id);return s;})} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 4px",cursor:"pointer",borderRadius:8}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f5f6f6"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <Av text={c.av} bg={c.color} size={44} fs={15} img={c.avImg}/>
                  <div style={{flex:1}}><div style={{fontSize:15,fontWeight:500,color:"#111b21"}}>{c.name}</div><div style={{fontSize:13,color:MUT}}>{c.about}</div></div>
                  <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${grpSel.has(c.id)?T:"#ccc"}`,background:grpSel.has(c.id)?T:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {grpSel.has(c.id)&&<Ic d="M20 6L9 17l-5-5" color="#fff" size={12} sw={2.5}/>}
                  </div>
                </div>
              ))}
              {grpSel.size>0&&(
                <button onClick={()=>setGrpStep(2)} style={{width:"100%",marginTop:12,padding:"12px 0",background:T,color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:600,cursor:"pointer"}}>
                  Next → ({grpSel.size} selected)
                </button>
              )}
            </div>
          ):(
            <div style={{padding:20}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20}}>
                <div style={{width:72,height:72,borderRadius:"50%",background:T,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:700,color:"#fff"}}>
                  {grpName?grpName[0].toUpperCase():"G"}
                </div>
              </div>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:T,marginBottom:5}}>GROUP NAME</label>
              <input value={grpName} onChange={e=>setGrpName(e.target.value)} placeholder="Enter group name" autoFocus
                style={{width:"100%",padding:"10px 13px",border:"1.5px solid #e9edef",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:16}}
                onFocus={e=>e.target.style.borderColor=T} onBlur={e=>e.target.style.borderColor="#e9edef"}/>
              <div style={{fontSize:13,color:MUT,marginBottom:12}}>Participants: {[...grpSel].map(id=>contacts.find(c=>c.id===id)?.name).join(", ")}</div>
              <button onClick={createGroup} style={{width:"100%",padding:"12px 0",background:T,color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:600,cursor:"pointer"}}>Create group ✓</button>
            </div>
          )}
        </SidePanel>

        <Toast/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
